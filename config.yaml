# ACT-R Unified Memory Configuration

# Weights for unified search
weights:
  qmd: 0.50
  activation: 0.15
  pagerank: 0.25
  relationships: 0.10
  exact_match_bonus: 0.10

# ACT-R parameters
actr:
  base_level: 0.3
  decay_constant: 0.5
  spreading_strength: 0.2

# Freshness/aging parameters (NEW)
freshness:
  resolved_days: 30        # Days after which resolved problems decay faster
  dead_end_days: 60         # Days after which dead-end problems can be archived
  resolved_decay_multiplier: 2.0   # Extra decay for resolved problems past threshold
  dead_end_decay_multiplier: 3.0   # Extra decay for dead-end problems

# Pre-retrieval check parameters (NEW)
pre_retrieval:
  min_length: 3            # Minimum query length to consider
  keywords:
    - problem
    - solution
    - fix
    - error
    - bug
    - issue
    - task
    - how
    - why
    - implement
    - configure
    - setup
    - build
    - create
    - find
    - remember
    - worked
    - tried
    - before
    - previous
    - past
    - learned
    - documented

# Paths (relative to memory directory)
paths:
  activation_log: activation-log.json
  tag_graph: tag-graph.json
  pagerank_scores: pagerank-scores.json
  problems_dir: memory/problems/

# Search settings
search:
  max_results: 10
  qmd_max_results: 15
